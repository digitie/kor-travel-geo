name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install GDAL system libraries
        timeout-minutes: 12
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Dpkg::Lock::Timeout=120 install -y --no-install-recommends gdal-bin libgdal-dev
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install "gdal==$(gdal-config --version)"
          python -m pip install -e ".[api,loaders,dev]"
      - name: Lint and type-check
        run: |
          ruff check .
          mypy src/kortravelgeo scripts/export_openapi.py
          lint-imports
      - name: Test
        env:
          TMPDIR: /tmp
          TMP: /tmp
          TEMP: /tmp
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kor-travel-geo-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kor-travel-geo-ui/package-lock.json
      - name: Install frontend
        run: npm ci
      - name: Generate API types
        run: npm run gen:types
      - name: Verify generated files are committed
        run: git diff --exit-code -- types/api.gen.ts lib/schemas.gen.ts
      - name: Lint, type-check, test, build
        run: |
          npm run lint
          npm run type-check
          npm run test
          npm run build
