name: OpenAPI drift

on:
  pull_request:
  push:
    branches: [main]

jobs:
  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with API extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api]"
      - name: Check committed OpenAPI schema
        run: python scripts/export_openapi.py --check --output openapi.json
