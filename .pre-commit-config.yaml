repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: ["src/kortravelgeo", "scripts/export_openapi.py"]
        additional_dependencies:
          - pydantic>=2.9
          - pydantic-settings>=2.5
          - sqlalchemy[asyncio]>=2.0.35
          - geoalchemy2>=0.15
          - psycopg[binary,pool]>=3.2
          - fastapi>=0.115
          - httpx>=0.27
          - tenacity>=9.0
          - typer>=0.12
          - orjson>=3.10
          - prometheus-client>=0.21
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter
        entry: lint-imports
        language: system
        pass_filenames: false
