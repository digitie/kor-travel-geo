services:
  db:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_USER: addr
      POSTGRES_PASSWORD: addr
      POSTGRES_DB: kraddr_geo
    ports:
      - "${KRADDR_GEO_DB_PORT:-5432}:5432"
    volumes:
      - ${KRADDR_PGDATA:-~/kraddr-geo-data/pgdata}:/var/lib/postgresql/data
      - ${KRADDR_JUSO_DATA:-~/kraddr-geo-data/juso}:/data/juso:ro
    shm_size: "512mb"
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "random_page_cost=1.1"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U addr -d kraddr_geo"]
      interval: 5s
      timeout: 5s
      retries: 5
